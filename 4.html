<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>CP Tracker - 镜中人</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Serif+SC:wght@400;700&display=swap');
  * { margin:0;padding:0;box-sizing:border-box; }
  body { width:1080px;height:1080px;background:#f5f0e8;font-family:'Noto Serif SC',serif;overflow:hidden; }
  .card { width:1080px;height:1080px;background:#f5f0e8;display:flex;flex-direction:column; }
  .border-top { height:8px;background:#c0392b; }
  .border-top-thin { height:3px;background:#2c2c2c;margin-top:3px; }
  .header { padding:18px 30px 12px 30px;display:flex;align-items:flex-start; }
  .brand-left { display:flex;flex-direction:column;gap:6px; }
  .brand-title { font-size:62px;font-weight:900;color:#1a1a1a;font-family:'Black Han Sans','Arial Black',sans-serif;letter-spacing:-1px;line-height:1; }
  .love-type-row { display:flex;align-items:center;gap:6px; }
  .badge { background:#c0392b;color:#fff;font-size:22px;font-weight:900;font-family:'Black Han Sans','Arial Black',sans-serif;padding:4px 14px;letter-spacing:1px; }
  .ampersand { color:#1a1a1a;font-size:28px;font-weight:900;font-family:'Arial Black',sans-serif; }
  .brand-right { display:flex;flex-direction:column;justify-content:center;padding-left:30px;padding-top:4px;flex:1; }
  .divider-thick { height:5px;background:#c0392b;margin:0 30px; }
  .divider-thin { height:2px;background:#2c2c2c;margin:4px 30px 0; }
  .content { display:flex;flex:1;padding:20px 30px 0 30px;gap:20px; }
  .left-panel { width:400px;display:flex;flex-direction:column;gap:16px; }
  .radar-container { background:#ede8dc;border:2px solid #b5a98a;padding:20px 10px;display:flex;align-items:center;justify-content:center;height:300px; }
  .quote-box { background:#c0392b;padding:16px 18px;color:#fff;font-size:20px;font-weight:700;line-height:1.6;letter-spacing:1px; }
  .body-text { font-size:15px;color:#2c2c2c;line-height:1.9;letter-spacing:0.5px;text-align:justify; }
  .right-panel { flex:1;position:relative;overflow:hidden; }
  .newspaper-bg { position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(0,0,0,0.04) 18px,rgba(0,0,0,0.04) 19px),repeating-linear-gradient(90deg,transparent,transparent 50px,rgba(0,0,0,0.02) 50px,rgba(0,0,0,0.02) 51px);background-color:#e8e0d0; }
  .newspaper-torn { position:absolute;top:0;width:100%;height:130px;background:#d4cbb8;clip-path:polygon(0 0,100% 0,100% 60%,85% 80%,70% 65%,55% 85%,40% 70%,25% 90%,10% 75%,0 85%); }
  .dots-overlay { position:absolute;inset:0;background-image:radial-gradient(circle,rgba(0,0,0,0.12) 1px,transparent 1px);background-size:8px 8px;opacity:0.5; }
  .illustration { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%); }
  .border-bottom-thin { height:3px;background:#2c2c2c;margin-top:auto; }
  .border-bottom { height:8px;background:#c0392b;margin-top:3px; }
  canvas { display:block; }
</style>
</head>
<body>
<div class="card">
  <div class="border-top"></div>
  <div class="border-top-thin"></div>

  <div class="header">
    <div class="brand-left">
      <div class="brand-title">CP Tracker</div>
      <div class="love-type-row">
        <div class="badge">LOVE</div>
        <span class="ampersand">&amp;</span>
        <div class="badge">TYPE</div>
      </div>
    </div>
    <div class="brand-right">
      <div style="font-size:62px;font-weight:900;color:#1a1a1a;font-family:'Black Han Sans','Arial Black',sans-serif;letter-spacing:-1px;line-height:1;">25型 CP人格</div>
      <div style="display:flex;align-items:baseline;gap:30px;margin-top:4px;">
        <div style="font-size:42px;font-weight:900;color:#c0392b;font-family:'Black Han Sans','Arial Black',sans-serif;letter-spacing:2px;line-height:1;">MIRROR</div>
        <div style="font-size:52px;font-weight:900;color:#1a1a1a;font-family:'Black Han Sans','Noto Serif SC',sans-serif;letter-spacing:4px;line-height:1;">镜中人</div>
      </div>
      <div style="font-size:17px;color:#2c2c2c;margin-top:6px;letter-spacing:1px;">关系映射：自我之像 犹如镜中</div>
    </div>
  </div>

  <div class="divider-thick"></div>
  <div class="divider-thin"></div>

  <div class="content">
    <div class="left-panel">
      <div class="radar-container">
        <canvas id="radar" width="360" height="280"></canvas>
      </div>
      <div class="quote-box">
        我看向一个难以触及的希望，<br>但镜中照见，期盼有了具象的模样
      </div>
      <div class="body-text">
        你习惯将内心深处的渴望与自我期待，温柔地投射到所钟爱的CP身上。<br>
        这份喜爱，早已超越了单纯的旁观，而是一种深度的情感卷入与精神寄托。CP的每一次共同进退、相互陪伴的旅程，都是自己内心戏码的温柔映照。<br>
        在你眼中，CP不仅是故事的主角，更是情感的镜像，那份紧密的关联，让你在见证CP成长的同时，也悄然完成了对理想自我的探寻与慰藉。
      </div>
    </div>

    <div class="right-panel">
      <div class="newspaper-bg"></div>
      <div class="newspaper-torn"></div>
      <div class="dots-overlay"></div>
      <div class="illustration">
        <svg width="360" height="420" viewBox="0 0 360 420" xmlns="http://www.w3.org/2000/svg">
          <!-- Mirror/oval frame with two shadow figures -->
          <!-- Sepia/vintage background oval -->
          <ellipse cx="180" cy="230" rx="155" ry="185" fill="#c8b896" opacity="0.8"/>
          <ellipse cx="180" cy="230" rx="148" ry="178" fill="#d4c4a0"/>
          <!-- Light texture inside oval -->
          <ellipse cx="180" cy="230" rx="140" ry="170" fill="#e0d0b0" opacity="0.6"/>

          <!-- Two shadow silhouettes facing each other -->
          <!-- Left figure (shadow) -->
          <g opacity="0.75">
            <!-- Head -->
            <circle cx="128" cy="155" r="22" fill="#3a2a1a"/>
            <!-- Neck -->
            <rect x="121" y="175" width="14" height="15" fill="#3a2a1a"/>
            <!-- Body -->
            <path d="M98 190 C95 225 98 265 100 285 L158 285 C160 265 163 225 160 190 C152 185 140 182 128 182 C116 182 104 185 98 190 Z" fill="#3a2a1a"/>
            <!-- Arm reaching toward center -->
            <path d="M158 210 C170 205 185 208 195 215" stroke="#3a2a1a" stroke-width="14" fill="none" stroke-linecap="round"/>
            <!-- Legs -->
            <rect x="106" y="282" width="20" height="60" rx="5" fill="#2a1a0a"/>
            <rect x="132" y="282" width="20" height="60" rx="5" fill="#2a1a0a"/>
          </g>

          <!-- Right figure (shadow) - mirrored -->
          <g opacity="0.65">
            <!-- Head -->
            <circle cx="232" cy="148" r="20" fill="#2a1a0a"/>
            <!-- Body -->
            <path d="M205 185 C202 220 205 258 207 278 L258 278 C260 258 262 220 255 185 C248 180 240 178 232 178 C220 178 210 180 205 185 Z" fill="#2a1a0a"/>
            <!-- Arm reaching toward center -->
            <path d="M205 210 C193 205 178 208 168 215" stroke="#2a1a0a" stroke-width="12" fill="none" stroke-linecap="round"/>
            <!-- Legs -->
            <rect x="212" y="275" width="18" height="55" rx="5" fill="#1a0a00"/>
            <rect x="234" y="275" width="18" height="55" rx="5" fill="#1a0a00"/>
          </g>

          <!-- Oval frame border -->
          <ellipse cx="180" cy="230" rx="155" ry="185" fill="none" stroke="#8a7040" stroke-width="8"/>
          <ellipse cx="180" cy="230" rx="150" ry="180" fill="none" stroke="#6a5030" stroke-width="3"/>

          <!-- White outline around oval -->
          <ellipse cx="180" cy="230" rx="158" ry="188" fill="none" stroke="white" stroke-width="6"/>

          <!-- Halftone dots scattered -->
          <g opacity="0.35">
            <circle cx="30" cy="200" r="5" fill="#1a1a1a"/>
            <circle cx="18" cy="225" r="6" fill="#1a1a1a"/>
            <circle cx="28" cy="250" r="4" fill="#1a1a1a"/>
            <circle cx="15" cy="270" r="7" fill="#1a1a1a"/>
            <circle cx="330" cy="195" r="5" fill="#1a1a1a"/>
            <circle cx="342" cy="220" r="6" fill="#1a1a1a"/>
            <circle cx="332" cy="248" r="4" fill="#1a1a1a"/>
            <circle cx="345" cy="268" r="7" fill="#1a1a1a"/>
            <circle cx="80" cy="410" r="5" fill="#1a1a1a"/>
            <circle cx="120" cy="418" r="6" fill="#1a1a1a"/>
            <circle cx="165" cy="420" r="7" fill="#1a1a1a"/>
            <circle cx="210" cy="420" r="7" fill="#1a1a1a"/>
            <circle cx="255" cy="418" r="6" fill="#1a1a1a"/>
            <circle cx="295" cy="410" r="5" fill="#1a1a1a"/>
          </g>

          <!-- Top decorative element - bent figure/arm -->
          <path d="M160 35 C150 20 140 10 150 5 C160 0 175 8 185 20 C192 28 190 40 185 50" stroke="#2a1a0a" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.7"/>
          <circle cx="163" cy="30" r="12" fill="#2a1a0a" opacity="0.65"/>
        </svg>
      </div>
    </div>
  </div>

  <div style="height:16px;"></div>
  <div class="border-bottom-thin"></div>
  <div class="border-bottom"></div>
</div>

<script>
const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');
const cx = canvas.width/2, cy = canvas.height/2+10;
const R = 110;
const values = [25, 75, 55, 42, 50];

function getPoint(i,r){
  const a=(i*2*Math.PI/5)-Math.PI/2;
  return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};
}

ctx.fillStyle='rgba(60,50,30,0.85)';
ctx.beginPath();
for(let i=0;i<5;i++){const p=getPoint(i,R);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
ctx.closePath();ctx.fill();

ctx.strokeStyle='rgba(180,160,100,0.4)';ctx.lineWidth=1;
[20,40,60,80,100].forEach(pct=>{
  const r=R*pct/100;
  ctx.beginPath();
  for(let i=0;i<5;i++){const p=getPoint(i,r);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
  ctx.closePath();ctx.stroke();
});
for(let i=0;i<5;i++){const p=getPoint(i,R);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p.x,p.y);ctx.stroke();}

ctx.fillStyle='rgba(180,30,30,0.4)';ctx.strokeStyle='#c0392b';ctx.lineWidth=2.5;
ctx.beginPath();
values.forEach((v,i)=>{const r=R*v/100;const p=getPoint(i,r);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
ctx.closePath();ctx.fill();ctx.stroke();

ctx.fillStyle='#c0392b';
values.forEach((v,i)=>{const r=R*v/100;const p=getPoint(i,r);ctx.beginPath();ctx.arc(p.x,p.y,5,0,2*Math.PI);ctx.fill();});

const lbl=['自我模型','情感模型','态度模型','行动驱动','社交模型'];
values.forEach((v,i)=>{
  const p=getPoint(i,R+26);
  ctx.fillStyle='#c0392b';ctx.font='bold 18px "Arial Black",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(v,p.x,p.y-12);
  ctx.fillStyle='#2c2c2c';ctx.font='14px "Noto Serif SC",serif';
  ctx.fillText(lbl[i],p.x,p.y+10);
});
</script>
</body>
</html>
