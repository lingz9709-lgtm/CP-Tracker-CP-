<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>CP Tracker - 三分糖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Serif+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #f5f0e8;
    font-family: 'Noto Serif SC', serif;
    overflow: hidden;
    position: relative;
  }

  .card {
    width: 1080px;
    height: 1080px;
    background: #f5f0e8;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Top border lines */
  .border-top {
    height: 8px;
    background: #c0392b;
    width: 100%;
  }
  .border-top-thin {
    height: 3px;
    background: #2c2c2c;
    width: 100%;
    margin-top: 3px;
  }

  /* Header */
  .header {
    padding: 18px 30px 12px 30px;
    display: flex;
    align-items: flex-start;
    gap: 0;
    background: #f5f0e8;
  }

  .brand-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .brand-title {
    font-size: 62px;
    font-weight: 900;
    color: #1a1a1a;
    font-family: 'Black Han Sans', 'Arial Black', sans-serif;
    letter-spacing: -1px;
    line-height: 1;
  }

  .love-type-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge {
    background: #c0392b;
    color: #fff;
    font-size: 22px;
    font-weight: 900;
    font-family: 'Black Han Sans', 'Arial Black', sans-serif;
    padding: 4px 14px;
    letter-spacing: 1px;
  }

  .ampersand {
    color: #1a1a1a;
    font-size: 28px;
    font-weight: 900;
    font-family: 'Arial Black', sans-serif;
  }

  .brand-right {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 30px;
    padding-top: 4px;
    flex: 1;
  }

  .type-name-en {
    font-size: 42px;
    font-weight: 900;
    color: #c0392b;
    font-family: 'Black Han Sans', 'Arial Black', sans-serif;
    letter-spacing: 2px;
    line-height: 1;
  }

  .type-name-zh {
    font-size: 52px;
    font-weight: 900;
    color: #1a1a1a;
    font-family: 'Black Han Sans', 'Noto Serif SC', sans-serif;
    letter-spacing: 4px;
    line-height: 1;
    margin-top: 2px;
  }

  .type-subtitle {
    font-size: 17px;
    color: #2c2c2c;
    margin-top: 6px;
    letter-spacing: 1px;
    font-weight: 400;
  }

  /* Divider lines */
  .divider-thick {
    height: 5px;
    background: #c0392b;
    margin: 0 30px;
  }
  .divider-thin {
    height: 2px;
    background: #2c2c2c;
    margin: 4px 30px 0;
  }

  /* Content area */
  .content {
    display: flex;
    flex: 1;
    padding: 20px 30px 0 30px;
    gap: 20px;
  }

  /* Left panel */
  .left-panel {
    width: 400px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .radar-container {
    background: #ede8dc;
    border: 2px solid #b5a98a;
    padding: 20px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 300px;
  }

  .quote-box {
    background: #c0392b;
    padding: 16px 18px;
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.6;
    letter-spacing: 1px;
  }

  .body-text {
    font-size: 15px;
    color: #2c2c2c;
    line-height: 1.9;
    letter-spacing: 0.5px;
    text-align: justify;
  }

  /* Right panel - illustration */
  .right-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .newspaper-bg {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 18px, rgba(0,0,0,0.04) 18px, rgba(0,0,0,0.04) 19px),
      repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(0,0,0,0.02) 50px, rgba(0,0,0,0.02) 51px);
    background-color: #e8e0d0;
  }

  .newspaper-torn {
    position: absolute;
    top: 0;
    right: 0;
    width: 100%;
    height: 130px;
    background: #d4cbb8;
    clip-path: polygon(0 0, 100% 0, 100% 60%, 85% 80%, 70% 65%, 55% 85%, 40% 70%, 25% 90%, 10% 75%, 0 85%);
  }

  .dots-overlay {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.12) 1px, transparent 1px);
    background-size: 8px 8px;
    opacity: 0.5;
  }

  .illustration {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Bottom border */
  .border-bottom-thin {
    height: 3px;
    background: #2c2c2c;
    width: 100%;
    margin-top: auto;
  }
  .border-bottom {
    height: 8px;
    background: #c0392b;
    width: 100%;
    margin-top: 3px;
  }

  canvas { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="border-top"></div>
  <div class="border-top-thin"></div>

  <div class="header">
    <div class="brand-left">
      <div class="brand-title">CP Tracker</div>
      <div class="love-type-row">
        <div class="badge">LOVE</div>
        <span class="ampersand">&amp;</span>
        <div class="badge">TYPE</div>
      </div>
    </div>
    <div class="brand-right">
      <div style="display:flex; align-items:baseline; gap:20px;">
        <div style="font-size:62px;font-weight:900;color:#1a1a1a;font-family:'Black Han Sans','Arial Black',sans-serif;letter-spacing:-1px;line-height:1;">25型 CP人格</div>
      </div>
      <div style="display:flex; align-items:baseline; gap:30px; margin-top:4px;">
        <div class="type-name-en">LESS is MORE</div>
        <div class="type-name-zh">三分糖</div>
      </div>
      <div class="type-subtitle">理性控制：微妙的甜是你喜欢的口味</div>
    </div>
  </div>

  <div class="divider-thick"></div>
  <div class="divider-thin"></div>

  <div class="content">
    <div class="left-panel">
      <div class="radar-container">
        <canvas id="radar" width="360" height="280"></canvas>
      </div>
      <div class="quote-box">
        多一分的甜和少一分的淡，<br>推拉克制是独属于你的刚刚好。
      </div>
      <div class="body-text">
        你在CP的情感配方里恪守着"刚刚好"的哲学。独特的品味让你能从纷繁万象中表象中，提炼出最本质的美感，既不沉溺于过剩的甜蜜，也不流于寡淡的疏离。<br>
        这种理性克制并非冷漠，而是一种高级的心理距离——推拉开恰到好处的空间，让情感得以呼吸。你懂得留白，在CP的每一次互动中精准捕捉到那一抹微妙的甜。
      </div>
    </div>

    <div class="right-panel">
      <div class="newspaper-bg"></div>
      <div class="newspaper-torn"></div>
      <div class="dots-overlay"></div>
      <div class="illustration">
        <svg width="340" height="380" viewBox="0 0 340 380" xmlns="http://www.w3.org/2000/svg">
          <!-- Coffee cup illustration -->
          <defs>
            <filter id="grain">
              <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
              <feColorMatrix type="saturate" values="0"/>
              <feBlend in="SourceGraphic" mode="multiply"/>
            </filter>
          </defs>
          <!-- Cup body -->
          <path d="M80 120 Q75 320 90 340 Q170 360 250 340 Q265 320 260 120 Z" fill="#1a1a1a"/>
          <!-- Cup rim -->
          <ellipse cx="170" cy="120" rx="90" ry="22" fill="#2a2a2a"/>
          <!-- Inner ellipse top -->
          <ellipse cx="170" cy="118" rx="75" ry="17" fill="#3a3a3a"/>
          <!-- Latte art - heart -->
          <path d="M170 105 C155 90 135 95 135 108 C135 120 155 130 170 145 C185 130 205 120 205 108 C205 95 185 90 170 105 Z" fill="#8B6914" opacity="0.7"/>
          <!-- Foam dots -->
          <circle cx="148" cy="112" r="4" fill="#c8a96e" opacity="0.6"/>
          <circle cx="192" cy="112" r="4" fill="#c8a96e" opacity="0.6"/>
          <circle cx="170" cy="130" r="3" fill="#c8a96e" opacity="0.5"/>
          <!-- Cup highlight -->
          <path d="M85 150 Q82 200 84 250" stroke="#3a3a3a" stroke-width="3" fill="none"/>
          <!-- White outline -->
          <path d="M80 120 Q75 320 90 340 Q170 360 250 340 Q265 320 260 120" fill="none" stroke="white" stroke-width="6"/>
          <ellipse cx="170" cy="120" rx="90" ry="22" fill="none" stroke="white" stroke-width="6"/>
          <!-- Halftone dots at bottom -->
          <g opacity="0.3">
            <circle cx="100" cy="360" r="3" fill="#1a1a1a"/>
            <circle cx="120" cy="368" r="4" fill="#1a1a1a"/>
            <circle cx="145" cy="372" r="5" fill="#1a1a1a"/>
            <circle cx="170" cy="374" r="6" fill="#1a1a1a"/>
            <circle cx="200" cy="372" r="5" fill="#1a1a1a"/>
            <circle cx="225" cy="368" r="4" fill="#1a1a1a"/>
            <circle cx="245" cy="360" r="3" fill="#1a1a1a"/>
          </g>
        </svg>
      </div>
    </div>
  </div>

  <div style="height:16px;"></div>
  <div class="border-bottom-thin"></div>
  <div class="border-bottom"></div>
</div>

<script>
const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2 + 10;
const R = 110; // max radius

// 5 dimensions: 自我模型, 情感模型, 态度模型, 行动驱动, 社交模型
// angles: top=270deg, then clockwise
const labels = ['自我模型','情感模型','态度模型','行动驱动','社交模型'];
const values = [68, 44, 60, 58, 52];
const max = 100;

function getPoint(i, r) {
  const angle = (i * 2 * Math.PI / 5) - Math.PI/2;
  return {
    x: cx + r * Math.cos(angle),
    y: cy + r * Math.sin(angle)
  };
}

// Draw background pentagons
ctx.strokeStyle = '#8a7a5a';
ctx.lineWidth = 1;
[20,40,60,80,100].forEach(pct => {
  const r = R * pct / 100;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const p = getPoint(i,r);
    i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y);
  }
  ctx.closePath();
  ctx.stroke();
});

// Draw axes
ctx.strokeStyle = '#8a7a5a';
for(let i=0;i<5;i++){
  const p = getPoint(i, R);
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
}

// Fill background pentagon dark
ctx.fillStyle = 'rgba(60,50,30,0.85)';
ctx.beginPath();
for(let i=0;i<5;i++){
  const p = getPoint(i,R);
  i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y);
}
ctx.closePath();
ctx.fill();

// Redraw grid on top of dark bg
ctx.strokeStyle = 'rgba(180,160,100,0.4)';
ctx.lineWidth = 1;
[20,40,60,80,100].forEach(pct => {
  const r = R * pct / 100;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const p = getPoint(i,r);
    i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y);
  }
  ctx.closePath();
  ctx.stroke();
});

// Draw axes again
ctx.strokeStyle = 'rgba(180,160,100,0.4)';
for(let i=0;i<5;i++){
  const p = getPoint(i, R);
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
}

// Draw data polygon
ctx.fillStyle = 'rgba(180,30,30,0.4)';
ctx.strokeStyle = '#c0392b';
ctx.lineWidth = 2.5;
ctx.beginPath();
values.forEach((v,i) => {
  const r = R * v / max;
  const p = getPoint(i,r);
  i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y);
});
ctx.closePath();
ctx.fill();
ctx.stroke();

// Draw dots at vertices
ctx.fillStyle = '#c0392b';
values.forEach((v,i) => {
  const r = R * v / max;
  const p = getPoint(i,r);
  ctx.beginPath();
  ctx.arc(p.x,p.y,5,0,2*Math.PI);
  ctx.fill();
});

// Draw labels and values
ctx.font = 'bold 15px "Noto Serif SC", serif';
const labelPad = 26;
values.forEach((v,i) => {
  const p = getPoint(i, R + labelPad);
  const labelNames = ['自我模型','情感模型','态度模型','行动驱动','社交模型'];
  
  ctx.fillStyle = '#c0392b';
  ctx.font = 'bold 18px "Arial Black", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(v, p.x, p.y - 12);
  
  ctx.fillStyle = '#2c2c2c';
  ctx.font = '14px "Noto Serif SC", serif';
  ctx.fillText(labelNames[i], p.x, p.y + 10);
});
</script>
</body>
</html>
